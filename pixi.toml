[project]
name = "homemade-intelligence"
version = "0.1.0"
description = "A personal, bias-aware intelligence platform for geopolitical analysis and investment decision-making"
authors = ["Mike Shih"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[tasks]
# placeholder tasks — expand as tooling is built
# analyze = "python tools/analyze.py"
# report  = "python tools/generate_report.py"
lint = "ruff check ."
format = "ruff format ."
test = "pytest tests/ -v"

[dependencies]
python = ">=3.11"

[pypi-dependencies]

[feature.dev.dependencies]
ruff = "*"
pre-commit = "*"
pytest = "*"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
