# =============================================================================
# CI — Lint, format check, and test
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.41.4

      - name: Install dev environment
        run: pixi install -e dev

      - name: Ruff lint
        run: pixi run -e dev ruff check .

      - name: Ruff format check
        run: pixi run -e dev ruff format --check .

      - name: Pre-commit hooks
        run: pixi run -e dev pre-commit run --all-files

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.41.4

      - name: Install dev environment
        run: pixi install -e dev

      - name: Run tests
        run: pixi run -e dev pytest tests/ -v --tb=short

  ai-instructions:
    name: AI Instructions Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify AI instruction files exist
        run: |
          echo "Checking AI instruction files..."
          test -f AGENTS.md                                                  || { echo "❌ Missing AGENTS.md"; exit 1; }
          test -f .github/instructions/project.instructions.md               || { echo "❌ Missing project.instructions.md"; exit 1; }
          test -f .github/instructions/coding.instructions.md                || { echo "❌ Missing coding.instructions.md"; exit 1; }
          test -f .github/instructions/domain.instructions.md                || { echo "❌ Missing domain.instructions.md"; exit 1; }
          test -f .github/instructions/markdown.instructions.md              || { echo "❌ Missing markdown.instructions.md"; exit 1; }
          test -f .github/instructions/market-report.instructions.md         || { echo "❌ Missing market-report.instructions.md"; exit 1; }
          echo "✅ All AI instruction files present"
