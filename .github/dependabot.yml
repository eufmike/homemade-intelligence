# =============================================================================
# Dependabot — automated dependency updates
# https://docs.github.com/en/code-security/dependabot
# =============================================================================

version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # pip / PyPI dependencies (reads pixi.toml pypi-dependencies)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
